<!DOCTYPE html>
<html>
  <head>
    <title>Signing in...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <p>Signing in with LinkedIn&hellip;<br />Redirecting back to the app.</p>
    <script>
      // LinkedIn redirects here with ?code=xxx&state=xxx
      // Forward the full query string back into the app via deep link.
      // Using DOMContentLoaded ensures the redirect fires after the page is ready.
      document.addEventListener('DOMContentLoaded', function () {
        var params = window.location.search;
        window.location.href = 'networkingapp://oauth' + params;
      });
    </script>
  </body>
</html>
